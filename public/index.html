<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leaderboard IPL 2026</title>
    <meta name="description" content="Dream11 IPL 2026 Season Leaderboard — Live standings, player stats, and rank progression.">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-deep: #05010d;
            --bg-mid: #0d0221;
            --bg-surface: rgba(15, 8, 36, 0.75);
            --bg-row: rgba(20, 12, 50, 0.5);
            --bg-row-hover: rgba(35, 20, 80, 0.7);
            --bg-modal: rgba(15, 8, 36, 0.95);
            --bg-input: rgba(10, 5, 25, 0.8);
            --text-main: #eee8ff;
            --text-sub: #8b7faa;
            --border-color: rgba(168, 85, 247, 0.12);
            --border-glow: rgba(168, 85, 247, 0.3);
            --gold: #fbbf24;
            --gold-glow: rgba(251, 191, 36, 0.15);
            --silver: #94a3b8;
            --bronze: #d97706;
            --accent: #a855f7;
            --accent-glow: rgba(168, 85, 247, 0.2);
            --cyan: #06b6d4;
            --green: #10b981;
            --red: #ef4444;
            --orange: #f97316;
        }

        body {
            background: var(--bg-deep);
            font-family: 'DM Sans', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            overflow-x: hidden;
            position: relative;
        }

        /* ===== ANIMATED BACKGROUND ===== */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 50% 0%, rgba(168, 85, 247, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(6, 182, 212, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 90%, rgba(251, 191, 36, 0.04) 0%, transparent 40%);
            z-index: 0;
            pointer-events: none;
        }

        /* Floating particles */
        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 2px; height: 2px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0;
            animation: floatParticle linear infinite;
        }
        .particle:nth-child(1) { left: 10%; animation-duration: 18s; animation-delay: 0s; }
        .particle:nth-child(2) { left: 25%; animation-duration: 22s; animation-delay: 3s; width: 3px; height: 3px; }
        .particle:nth-child(3) { left: 40%; animation-duration: 16s; animation-delay: 6s; background: var(--cyan); }
        .particle:nth-child(4) { left: 55%; animation-duration: 20s; animation-delay: 2s; }
        .particle:nth-child(5) { left: 70%; animation-duration: 24s; animation-delay: 5s; background: var(--gold); width: 2px; height: 2px; }
        .particle:nth-child(6) { left: 85%; animation-duration: 19s; animation-delay: 8s; background: var(--cyan); }
        .particle:nth-child(7) { left: 15%; animation-duration: 21s; animation-delay: 4s; }
        .particle:nth-child(8) { left: 60%; animation-duration: 17s; animation-delay: 7s; background: var(--gold); }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* ===== MAIN WRAPPER ===== */
        .lb-wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 700px;
            background: var(--bg-surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2rem;
            box-shadow:
                0 0 60px rgba(168, 85, 247, 0.05),
                0 20px 60px rgba(0,0,0,0.4),
                inset 0 1px 0 rgba(255,255,255,0.03);
        }

        /* Glowing top border accent */
        .lb-wrap::before {
            content: '';
            position: absolute;
            top: -1px; left: 20%; right: 20%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--gold), var(--accent), transparent);
            border-radius: 2px;
        }

        /* ===== TITLE ===== */
        .lb-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            letter-spacing: 0.12em;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 30%, #fbbf24 50%, #d97706 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 0.3rem;
            filter: drop-shadow(0 0 20px rgba(251, 191, 36, 0.3));
        }
        .lb-sub {
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 1.8rem;
            opacity: 0.8;
        }

        /* ===== PODIUM ===== */
        .podium-section {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 12px;
            margin-bottom: 2rem;
            padding: 0 0.5rem;
            min-height: 200px;
        }
        .podium-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem 0.8rem 1.2rem;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            flex: 1;
            max-width: 160px;
        }
        .podium-card:hover {
            transform: translateY(-6px) scale(1.03);
        }

        /* 1st place */
        .podium-1st {
            background: linear-gradient(180deg, rgba(251,191,36,0.12) 0%, rgba(251,191,36,0.03) 100%);
            border: 1px solid rgba(251,191,36,0.25);
            box-shadow: 0 0 30px rgba(251,191,36,0.08), 0 8px 32px rgba(0,0,0,0.3);
            padding-top: 1.5rem;
            order: 2;
        }
        .podium-1st::before {
            content: '👑';
            position: absolute;
            top: -16px;
            font-size: 1.6rem;
            filter: drop-shadow(0 0 8px rgba(251,191,36,0.5));
            animation: crownFloat 3s ease-in-out infinite;
        }
        @keyframes crownFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        /* 2nd place */
        .podium-2nd {
            background: linear-gradient(180deg, rgba(148,163,184,0.1) 0%, rgba(148,163,184,0.02) 100%);
            border: 1px solid rgba(148,163,184,0.2);
            box-shadow: 0 0 20px rgba(148,163,184,0.05), 0 8px 32px rgba(0,0,0,0.3);
            order: 1;
            margin-bottom: 12px;
        }

        /* 3rd place */
        .podium-3rd {
            background: linear-gradient(180deg, rgba(217,119,6,0.1) 0%, rgba(217,119,6,0.02) 100%);
            border: 1px solid rgba(217,119,6,0.2);
            box-shadow: 0 0 20px rgba(217,119,6,0.05), 0 8px 32px rgba(0,0,0,0.3);
            order: 3;
            margin-bottom: 12px;
        }

        /* Avatar circle */
        .podium-avatar {
            width: 56px; height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 0.6rem;
            position: relative;
        }
        .podium-1st .podium-avatar {
            width: 68px; height: 68px; font-size: 1.1rem;
            background: linear-gradient(135deg, rgba(251,191,36,0.2), rgba(245,158,11,0.1));
            border: 2px solid var(--gold);
            color: var(--gold);
            box-shadow: 0 0 20px rgba(251,191,36,0.2), inset 0 0 15px rgba(251,191,36,0.05);
        }
        .podium-2nd .podium-avatar {
            background: linear-gradient(135deg, rgba(148,163,184,0.15), rgba(148,163,184,0.05));
            border: 2px solid var(--silver);
            color: var(--silver);
            box-shadow: 0 0 15px rgba(148,163,184,0.15);
        }
        .podium-3rd .podium-avatar {
            background: linear-gradient(135deg, rgba(217,119,6,0.15), rgba(217,119,6,0.05));
            border: 2px solid var(--bronze);
            color: var(--bronze);
            box-shadow: 0 0 15px rgba(217,119,6,0.15);
        }

        .podium-rank-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.55rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
        }
        .podium-1st .podium-rank-label { color: var(--gold); }
        .podium-2nd .podium-rank-label { color: var(--silver); }
        .podium-3rd .podium-rank-label { color: var(--bronze); }

        .podium-name {
            font-weight: 700;
            font-size: 0.8rem;
            text-align: center;
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }
        .podium-wins {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
        }
        .podium-1st .podium-wins { color: var(--gold); }
        .podium-2nd .podium-wins { color: var(--silver); }
        .podium-3rd .podium-wins { color: var(--bronze); }

        .podium-wins-label {
            font-size: 0.55rem;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Podium fine alert */
        .podium-card.fine-alert {
            border-color: rgba(249, 115, 22, 0.4) !important;
            box-shadow: 0 0 25px rgba(249, 115, 22, 0.15), 0 8px 32px rgba(0,0,0,0.3) !important;
            animation: finePulse 2s ease-in-out infinite;
        }

        /* ===== DIVIDER ===== */
        .section-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1rem;
        }
        .section-divider::before, .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-glow), transparent);
        }
        .section-divider span {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.55rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-sub);
        }

        /* ===== TABLE HEADER ===== */
        .lb-header {
            display: grid;
            grid-template-columns: 50px 1fr 80px 50px;
            padding: 0 1rem 0.6rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.55rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-sub);
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 0.5rem;
        }
        .lb-header span:nth-child(3) { text-align: center; }
        .lb-header span:last-child { text-align: right; }

        /* ===== TABLE ROWS ===== */
        .lb-row {
            display: grid;
            grid-template-columns: 50px 1fr 80px 50px;
            align-items: center;
            padding: 0.7rem 1rem;
            border-radius: 10px;
            margin-bottom: 0.35rem;
            background: var(--bg-row);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.25s ease;
            animation: fadeUp 0.4s ease both;
        }
        .lb-row:hover {
            transform: translateX(4px) scale(1.01);
            background: var(--bg-row-hover);
            border-color: var(--border-glow);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.06);
        }

        /* Fine alert row */
        .lb-row.fine-row {
            background: linear-gradient(90deg, rgba(249,115,22,0.15) 0%, var(--bg-row) 100%);
            border-left: 3px solid var(--orange);
            border-color: rgba(249,115,22,0.25);
            animation: fadeUp 0.4s ease both, finePulse 2s ease-in-out infinite;
        }
        .fine-row .rank-badge { background: var(--orange); color: #fff; }
        .fine-row .player-name { color: var(--orange); }
        .fine-row .wins-count { color: var(--orange); }
        @keyframes finePulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(249,115,22,0); }
            50% { box-shadow: 0 0 16px 2px rgba(249,115,22,0.12); }
        }

        /* Rank badge */
        .rank-wrapper { display: flex; align-items: center; gap: 6px; }
        .rank-badge {
            width: 26px; height: 26px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            background: rgba(168, 85, 247, 0.15);
            color: var(--accent);
            border: 1px solid rgba(168, 85, 247, 0.2);
        }

        /* Trend arrows */
        .trend { font-size: 0.65rem; font-weight: bold; width: 12px; }
        .trend.up { color: var(--green); }
        .trend.down { color: var(--red); }
        .trend.flat { color: var(--text-sub); font-size: 0.5rem; }

        /* Player name */
        .player-name {
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
        }

        /* Form dots */
        .form-tracker { display: flex; gap: 4px; justify-content: center; }
        .form-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: rgba(139, 127, 170, 0.25);
        }
        .form-dot.W { background: var(--green); box-shadow: 0 0 6px rgba(16, 185, 129, 0.3); }
        .form-dot.L { background: var(--red); opacity: 0.5; }

        /* Wins count */
        .wins-count {
            text-align: right;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
        }

        /* ===== BUTTONS ===== */
        .refresh-btn {
            display: block;
            margin: 1.5rem auto 0;
            padding: 0.6rem 2.5rem;
            background: transparent;
            border: 1px solid var(--border-glow);
            border-radius: 30px;
            color: var(--accent);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .refresh-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(168,85,247,0.1), transparent);
            transition: left 0.5s ease;
        }
        .refresh-btn:hover {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.15);
            color: var(--text-main);
        }
        .refresh-btn:hover::after { left: 100%; }

        .admin-trigger {
            position: relative;
            z-index: 1;
            margin-top: 1.5rem;
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-sub);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.55rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .admin-trigger:hover {
            background: var(--bg-row-hover);
            color: var(--accent);
            border-color: var(--border-glow);
        }

        /* ===== MODALS ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(5, 1, 13, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-card {
            background: var(--bg-modal);
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            padding: 2rem;
            width: 90%;
            max-width: 450px;
            font-family: 'DM Sans', sans-serif;
            box-shadow: 0 0 60px rgba(168, 85, 247, 0.08), 0 30px 80px rgba(0,0,0,0.5);
            transform: scale(0.95);
            opacity: 0;
            animation: modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            position: relative;
        }
        .modal-card::before {
            content: '';
            position: absolute;
            top: -1px; left: 30%; right: 30%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            border-radius: 2px;
        }
        @keyframes modalPop { to { transform: scale(1); opacity: 1; } }
        .modal-card h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            margin-bottom: 1.5rem;
            text-align: center;
            color: var(--gold);
        }

        /* Admin inputs */
        .input-group { margin-bottom: 1.2rem; }
        .input-group label {
            display: block;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.55rem;
            color: var(--text-sub);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .admin-input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-main);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }
        .admin-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* Absentees */
        .absentee-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 0.5rem; }
        .absentee-pill {
            padding: 0.4rem 0.8rem;
            background: var(--bg-row);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--text-sub);
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }
        .absentee-pill.active {
            background: rgba(239, 68, 68, 0.12);
            color: var(--red);
            border-color: var(--red);
            font-weight: bold;
        }

        /* Admin buttons */
        .admin-btn-group { display: flex; gap: 8px; margin-top: 1.5rem; }
        .admin-btn {
            flex: 1;
            padding: 0.85rem;
            border-radius: 10px;
            cursor: pointer;
            border: none;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            transition: all 0.2s ease;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-cancel { background: rgba(139, 127, 170, 0.15); color: var(--text-main); }
        .btn-cancel:hover { background: rgba(139, 127, 170, 0.25); }
        .btn-submit { background: linear-gradient(135deg, var(--green), #059669); color: #fff; }
        .btn-submit:hover { filter: brightness(1.1); box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--red); border: 1px solid rgba(239, 68, 68, 0.2); }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.2); }
        .status-msg { margin-top: 1.2rem; text-align: center; font-size: 0.85rem; display: none; font-weight: 500; }

        /* ===== PLAYER STATS MODAL ===== */
        .stat-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-input);
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 0.8rem;
            border: 1px solid var(--border-color);
        }
        .stat-label {
            font-family: 'Orbitron', sans-serif;
            color: var(--text-sub);
            text-transform: uppercase;
            font-size: 0.55rem;
            letter-spacing: 0.1em;
            font-weight: 600;
        }
        .stat-value {
            color: var(--green);
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
        }
        .chart-container { position: relative; height: 180px; width: 100%; margin-bottom: 1.5rem; }

        .match-log { list-style: none; margin-bottom: 1.5rem; max-height: 120px; overflow-y: auto; }
        .match-log li {
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.85rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .match-log li::before { content: "🏆"; font-size: 1rem; }
        .match-log li:last-child { border-bottom: none; }

        /* Section label */
        .section-label {
            font-family: 'Orbitron', sans-serif;
            color: var(--text-sub);
            font-size: 0.55rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            letter-spacing: 0.15em;
            font-weight: 600;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            body { padding: 0.5rem; }
            .lb-wrap { padding: 1.2rem 0.8rem; max-width: 100%; border-radius: 16px; }
            .lb-title { font-size: 1.5rem; }
            .lb-sub { font-size: 0.5rem; letter-spacing: 0.3em; margin-bottom: 1.2rem; }

            .podium-section { gap: 6px; min-height: 170px; padding: 0; }
            .podium-card { padding: 0.8rem 0.5rem 1rem; border-radius: 12px; }
            .podium-avatar { width: 44px; height: 44px; font-size: 0.8rem; }
            .podium-1st .podium-avatar { width: 54px; height: 54px; font-size: 0.9rem; }
            .podium-1st::before { font-size: 1.2rem; top: -12px; }
            .podium-name { font-size: 0.7rem; }
            .podium-wins { font-size: 1rem; }
            .podium-rank-label { font-size: 0.45rem; }

            .lb-header, .lb-row { grid-template-columns: 42px 1fr 55px 38px; padding: 0.5rem 0.5rem; }
            .lb-header { font-size: 0.45rem; }
            .rank-badge { width: 22px; height: 22px; font-size: 0.65rem; border-radius: 6px; }
            .trend { width: 10px; font-size: 0.55rem; }
            .player-name { font-size: 0.82rem; }
            .form-dot { width: 6px; height: 6px; }
            .wins-count { font-size: 0.95rem; }

            .modal-card { padding: 1.5rem 1rem; max-height: 95vh; overflow-y: auto; border-radius: 16px; }
            .modal-card h3 { font-size: 1.2rem; }
            .admin-btn { font-size: 0.65rem; padding: 0.75rem 0.3rem; }
            .chart-container { height: 150px; }
        }
    </style>
</head>
<body>
    <!-- Floating particles -->
    <div class="particles">
        <div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div>
    </div>

    <div class="lb-wrap">
        <div class="lb-title">IPL 2026</div>
        <div class="lb-sub">Season Leaderboard</div>

        <!-- Top 3 Podium -->
        <div id="podium-section" class="podium-section"></div>

        <!-- Divider -->
        <div class="section-divider"><span>Standings</span></div>

        <!-- Remaining players table -->
        <div class="lb-header"><span>Rank</span><span>Player</span><span>Form</span><span>Wins</span></div>
        <div id="lb-body"><div style="text-align:center; padding: 2rem; color: var(--text-sub); font-family: 'Orbitron', sans-serif; font-size: 0.6rem; letter-spacing: 0.1em;">LOADING STANDINGS...</div></div>
        <button class="refresh-btn" onclick="fetchLeaderboard()">Refresh Data</button>
    </div>

    <button class="admin-trigger" onclick="toggleAdmin(true)">⚙️ Admin Portal</button>

    <!-- Admin Modal -->
    <div class="modal-overlay" id="adminModal">
        <div class="modal-card">
            <h3>Log Match Result</h3>
            <div class="input-group"><label>Date</label><input type="date" id="matchDate" class="admin-input"></div>
            <div class="input-group"><label>Match (e.g., CSK vs MI)</label><input type="text" id="matchName" class="admin-input" placeholder="Enter match teams"></div>
            <div class="input-group"><label>Winner</label><select id="matchWinner" class="admin-input"></select></div>
            <div class="input-group">
                <label>Absentees (Missed Match)</label>
                <div id="absenteeGrid" class="absentee-grid"></div>
            </div>
            <div class="input-group"><label>Admin PIN</label><input type="password" id="adminPin" class="admin-input" placeholder="Enter Admin PIN"></div>
            <div id="statusMsg" class="status-msg"></div>
            <div class="admin-btn-group">
                <button class="admin-btn btn-danger" onclick="undoMatch()">Revert Last</button>
                <button class="admin-btn btn-cancel" onclick="toggleAdmin(false)">Close</button>
                <button class="admin-btn btn-submit" id="submitBtn" onclick="submitMatch()">Save</button>
            </div>
        </div>
    </div>

    <!-- Player Stats Modal -->
    <div class="modal-overlay" id="playerModal">
        <div class="modal-card">
            <h3 id="pModalName">Player Name</h3>
            <div class="stat-box"><span class="stat-label">Total Season Wins</span><span class="stat-value" id="pModalWins">0</span></div>
            <div class="stat-box">
                <div>
                    <span class="stat-label">Consecutive Misses</span>
                    <div style="font-size:0.7rem; color:var(--text-sub); margin-top:2px;">At 3, a fine is issued</div>
                </div>
                <span class="stat-value" id="pModalMisses" style="color:#f59e0b;">0/3</span>
            </div>
            <div class="stat-box"><span class="stat-label">Total Fines Issued</span><span class="stat-value" id="pModalFines" style="color:var(--red);">0</span></div>
            <div class="section-label" style="margin-top: 1rem;">Rank Progression</div>
            <div class="chart-container"><canvas id="rankChart"></canvas></div>
            <div class="section-label">Recent Conquests</div>
            <ul class="match-log" id="pModalLog"></ul>
            <div class="admin-btn-group"><button class="admin-btn btn-cancel" style="flex: 1;" onclick="togglePlayer(false)">Close Profile</button></div>
        </div>
    </div>

    <script>
        let currentLeaderboardData = [];
        let rankChartInstance = null;

        function getInitials(name) {
            return name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
        }

        function rowClass(r, fineAlert) {
            if (fineAlert) return 'fine-row';
            return '';
        }

        function getTrend(trendValue) {
            if (trendValue > 0) return '<span class="trend up">▲</span>';
            if (trendValue < 0) return '<span class="trend down">▼</span>';
            return '<span class="trend flat">—</span>';
        }

        function getForm(formArray) {
            if (!formArray) return '';
            return formArray.map(result => `<div class="form-dot ${result}"></div>`).join('');
        }

        function render(data) {
            currentLeaderboardData = data;
            if (!data || !data.length) return;

            // === PODIUM (top 3) ===
            const podiumSection = document.getElementById('podium-section');
            const top3 = data.slice(0, 3);
            const podiumClasses = ['podium-1st', 'podium-2nd', 'podium-3rd'];
            const podiumLabels = ['1st Place', '2nd Place', '3rd Place'];

            // Arrange: 2nd, 1st, 3rd (CSS order handles visual position)
            podiumSection.innerHTML = top3.map((e, i) => {
                const fineClass = e.fineAlert ? 'fine-alert' : '';
                const fineIcon = e.fineAlert ? ' 🚨' : '';
                return `
                <div class="podium-card ${podiumClasses[i]} ${fineClass}" onclick="openPlayerProfile(${i})">
                    <div class="podium-avatar">${getInitials(e.player)}</div>
                    <div class="podium-rank-label">${podiumLabels[i]}</div>
                    <div class="podium-name">${e.player}${fineIcon}</div>
                    <div class="podium-wins">${e.wins}</div>
                    <div class="podium-wins-label">wins</div>
                </div>`;
            }).join('');

            // === REMAINING PLAYERS (4th onwards) ===
            const remaining = data.slice(3);
            const body = document.getElementById('lb-body');

            if (remaining.length === 0) {
                body.innerHTML = '';
            } else {
                body.innerHTML = remaining.map((e, i) => {
                    const globalIndex = i + 3;
                    let warningIcon = '';
                    if (e.fineAlert) warningIcon = `<span style="font-size:0.8rem; margin-left:6px;" title="Fine issued! 3 consecutive misses">🚨</span>`;

                    return `
                    <div class="lb-row ${rowClass(e.rank, e.fineAlert)}" style="animation-delay:${i * 0.04}s" onclick="openPlayerProfile(${globalIndex})">
                        <div class="rank-wrapper">${getTrend(e.trend)}<div class="rank-badge">${e.rank}</div></div>
                        <div class="player-name">${e.player} ${warningIcon}</div>
                        <div class="form-tracker">${getForm(e.form)}</div>
                        <div class="wins-count">${e.wins}</div>
                    </div>`;
                }).join('');
            }

            // Populate Dropdown & Absentee Grid
            const select = document.getElementById('matchWinner');
            const absenteeGrid = document.getElementById('absenteeGrid');
            select.innerHTML = '<option value="">-- Select Winner --</option>';
            absenteeGrid.innerHTML = '';

            data.forEach(e => {
                select.innerHTML += `<option value="${e.player}">${e.player}</option>`;
                absenteeGrid.innerHTML += `<div class="absentee-pill" onclick="this.classList.toggle('active')" data-player="${e.player}">${e.player}</div>`;
            });
        }

        // --- INITIAL LOAD ---
        fetchLeaderboard();
        document.getElementById('matchDate').valueAsDate = new Date();

        function fetchLeaderboard() {
            const body = document.getElementById('lb-body');
            body.style.opacity = '0.5';
            fetch('/api/leaderboard')
                .then(res => res.json())
                .then(data => { body.style.opacity = '1'; render(data); })
                .catch(err => { body.style.opacity = '1'; console.error('Failed to refresh:', err); });
        }

        function openPlayerProfile(index) {
            const player = currentLeaderboardData[index];
            if (!player) return;
            document.getElementById('playerModal').setAttribute('data-active-index', index);
            togglePlayer(true);

            document.getElementById('pModalName').innerText = player.player;
            document.getElementById('pModalWins').innerText = player.wins;
            document.getElementById('pModalMisses').innerText = (player.missStreak || 0) + "/3";
            document.getElementById('pModalFines').innerText = player.fines || 0;

            const logHTML = player.log && player.log.length > 0
                ? player.log.map(match => `<li>${match}</li>`).join('')
                : `<li style="justify-content:center; color:var(--text-sub);">No wins recorded yet.</li>`;
            document.getElementById('pModalLog').innerHTML = logHTML;

            try {
                const ctx = document.getElementById('rankChart').getContext('2d');
                if (rankChartInstance) rankChartInstance.destroy();
                const gridColor = 'rgba(168, 85, 247, 0.1)';
                const textColor = '#8b7faa';
                const historyData = player.rankHistory || [];
                const labels = historyData.length > 0 ? historyData.map((_, i) => `M${i + 1}`) : ['Pre-Season'];
                const chartData = historyData.length > 0 ? historyData : [player.rank || 1];

                rankChartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Season Rank',
                            data: chartData,
                            borderColor: '#a855f7',
                            backgroundColor: 'rgba(168, 85, 247, 0.08)',
                            borderWidth: 2,
                            tension: 0.4,
                            fill: true,
                            pointRadius: 4,
                            pointBackgroundColor: '#a855f7',
                            pointBorderColor: '#0d0221',
                            pointBorderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: { reverse: true, min: 1, ticks: { stepSize: 1, color: textColor, precision: 0 }, grid: { color: gridColor } },
                            x: { ticks: { color: textColor }, grid: { color: gridColor } }
                        },
                        plugins: { legend: { display: false } }
                    }
                });
            } catch (err) { console.error("Chart error:", err); }
        }

        function togglePlayer(show) {
            document.getElementById('playerModal').style.display = show ? 'flex' : 'none';
            if (show) triggerAnimation('#playerModal .modal-card');
        }

        function toggleAdmin(show) {
            document.getElementById('adminModal').style.display = show ? 'flex' : 'none';
            document.getElementById('statusMsg').style.display = 'none';
            if (show) triggerAnimation('#adminModal .modal-card');
            document.querySelectorAll('.absentee-pill').forEach(pill => pill.classList.remove('active'));
        }

        function triggerAnimation(selector) {
            const el = document.querySelector(selector);
            el.style.animation = 'none';
            el.offsetHeight;
            el.style.animation = 'modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';
        }

        function submitMatch() {
            const date = document.getElementById('matchDate').value;
            const match = document.getElementById('matchName').value;
            const winner = document.getElementById('matchWinner').value;
            const pin = document.getElementById('adminPin').value;

            const activePills = document.querySelectorAll('.absentee-pill.active');
            const absentees = Array.from(activePills).map(p => p.getAttribute('data-player')).join(', ');

            const status = document.getElementById('statusMsg');
            const btn = document.getElementById('submitBtn');

            if (!date || !match || !winner || !pin) { showStatus(status, "Please fill out Date, Match, Winner and PIN.", '#ef4444'); return; }
            btn.innerText = "Saving..."; btn.disabled = true;

            fetch('/api/match', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ date, matchName: match, winner, pin, absentees })
            })
            .then(res => res.json())
            .then(res => {
                btn.innerText = "Save"; btn.disabled = false;
                if (res.success) {
                    showStatus(status, res.message, '#10b981'); render(res.data);
                    setTimeout(() => { toggleAdmin(false); }, 1500);
                    document.getElementById('matchName').value = ''; document.getElementById('adminPin').value = '';
                } else showStatus(status, res.message, '#ef4444');
            })
            .catch(err => {
                btn.innerText = "Save"; btn.disabled = false; showStatus(status, "Connection error.", '#ef4444');
            });
        }

        function undoMatch() {
            const pin = document.getElementById('adminPin').value;
            const status = document.getElementById('statusMsg');
            if (!pin) { showStatus(status, "Enter PIN to Revert.", '#ef4444'); return; }
            if (!confirm("Are you sure you want to delete the absolute last match logged?")) return;

            fetch('/api/undo', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pin })
            })
            .then(res => res.json())
            .then(res => {
                if (res.success) {
                    showStatus(status, res.message, '#d97706'); render(res.data);
                    setTimeout(() => { toggleAdmin(false); }, 1500);
                    document.getElementById('adminPin').value = '';
                } else showStatus(status, res.message, '#ef4444');
            })
            .catch(err => { showStatus(status, "Connection error.", '#ef4444'); });
        }

        function showStatus(element, text, color) { element.style.display = 'block'; element.style.color = color; element.innerText = text; }
    </script>
</body>
</html>
